id: requirement-to-code
name: Requirements to Code
description: Complete development workflow from PRD to tested implementation

states:
  analyze:
    display_name: "Requirements Analysis"
    agent: analyst
    description: Analyze requirements and extract concepts
    next: design
    inputs: [requirements_document]

    entry_conditions:
      - type: resource_available
        source: .ai-agents/workspace/requirements/
        description: "Requirements documents available"

    entry_actions:
      - action: "Load requirements from .ai-agents/workspace/requirements/"
      - action: "Update session.yaml with current phase"

    execution:
      commands: ["#analyze"]
      expected_outputs:
        - .ai-agents/workspace/project-context.yaml (requirements section)
        - .ai-agents/workspace/artifacts/{change-id}/analysis.md

    exit_criteria:
      - type: context_updated
        target: .ai-agents/workspace/project-context.yaml
        section: requirements
        description: "Requirements section populated"
      - type: user_confirmation
        description: "User confirms analysis results"

    outputs:
      - target: .ai-agents/workspace/project-context.yaml
        section: requirements
        format: yaml
        description: "Structured requirements analysis"
      - target: .ai-agents/workspace/artifacts/{change-id}/analysis.md
        format: markdown
        description: "Detailed analysis document"

    rollback:
      allowed: true
      to_state: null
      preserve_outputs: false

  design:
    display_name: "Architecture Design"
    agent: architect
    description: Create system architecture based on requirements
    next: implement
    inputs: [requirement_analysis]

    entry_conditions:
      - type: recommended
        state: analyze
        description: "Requirements analysis recommended"
        on_skip: "Requirements analysis not completed. Design may lack foundation. Continue?"

    entry_actions:
      - action: "Load project-context.yaml"
      - action: "Load active pattern knowledge"

    execution:
      commands: ["#design", "#design --plan"]
      expected_outputs:
        - .ai-agents/workspace/project-context.yaml (architecture section)
        - .ai-agents/workspace/artifacts/{change-id}/design.md

    exit_criteria:
      - type: context_updated
        target: .ai-agents/workspace/project-context.yaml
        section: architecture
      - type: user_confirmation

    outputs:
      - target: .ai-agents/workspace/project-context.yaml
        section: architecture
        format: yaml
      - target: .ai-agents/workspace/artifacts/{change-id}/design.md
        format: markdown

    rollback:
      allowed: true
      to_state: analyze
      preserve_outputs: false

  implement:
    display_name: "Code Implementation"
    agent: developer
    description: Implement code based on architecture design
    next: review
    inputs: [architecture_design, implementation_plan]

    entry_conditions:
      - type: recommended
        state: design
        description: "Architecture design recommended"
        on_skip: "Architecture design not completed. Implementation may lack structure. Continue?"

    entry_actions:
      - action: "Load project-context.yaml"
      - action: "Load coding standards"

    execution:
      commands: ["#implement"]
      # Note: #fix and #refactor are independent shortcut operations, not part of this workflow
      expected_outputs:
        - .ai-agents/workspace/artifacts/{change-id}/implementation/

    exit_criteria:
      - type: file_exists
        target: .ai-agents/workspace/artifacts/{change-id}/implementation/
      - type: user_confirmation

    rollback:
      allowed: true
      to_state: design
      preserve_outputs: true

  review:
    display_name: "Code Review"
    agent: reviewer
    description: Review code for quality and standards
    next: test
    inputs: [implementation_code, architecture_design]

    entry_conditions:
      - type: recommended
        state: implement
        description: "Implementation recommended before review"
        on_skip: "No implementation artifacts found. Review may lack context. Continue?"

    entry_actions:
      - action: "Load implementation code"
      - action: "Load architecture for compliance check"

    execution:
      commands: ["#review"]
      expected_outputs:
        - .ai-agents/workspace/artifacts/{change-id}/review.md

    exit_criteria:
      - type: file_exists
        target: .ai-agents/workspace/artifacts/{change-id}/review.md
      - type: review_passed
        description: "No critical issues found"

    on_issues:
      action: implement
      message: "Review found issues. Use `#fix` to address them, then `#review` again."

    rollback:
      allowed: false

  test:
    display_name: "Testing"
    agent: tester
    description: Generate and run tests
    next: complete
    inputs: [implementation_code, requirement_analysis]

    entry_conditions:
      - type: recommended
        state: review
        description: "Review recommended before testing"
        on_skip: "Code review not completed. Testing may miss quality issues. Continue?"

    entry_actions:
      - action: "Load implementation code"
      - action: "Load requirements for test validation"

    execution:
      commands: ["#test"]
      expected_outputs:
        - .ai-agents/workspace/artifacts/{change-id}/tests/

    exit_criteria:
      - type: tests_passed
        description: "All tests pass"

    on_failure:
      action: implement
      message: "Tests failed. Use `#fix` to address the failures, then `#test` again."

    rollback:
      allowed: false

config:
  confirm_phase_transition: true
  auto_save_context: true
  allow_skip: true
  max_retries: 3
  error_handling: "pause_and_report"

transitions:
  - from: analyze
    to: design
    trigger: "#design"
    guard: "requirements populated && user_confirmed"
    on_success:
      - action: "Archive analysis artifacts"
      - action: "Update workflow status"

  - from: design
    to: implement
    trigger: "#implement"
    guard: "architecture populated && user_confirmed"

  - from: implement
    to: review
    trigger: "#review"
    guard: "implementation exists"

  - from: review
    to: test
    trigger: "#test"
    guard: "review_passed || user_confirmed_with_issues"

  - from: review
    to: implement
    trigger: "#fix"
    condition: "issues_found"
    description: "Return to implement when issues need fixing"

  - from: test
    to: implement
    trigger: "#fix"
    condition: "tests_failed"
    description: "Return to implement when tests fail"

  # Quick path: simple changes can skip design
  - from: analyze
    to: implement
    trigger: "#implement"
    guard: "requirements populated && user_confirmed && complexity_is_low"
    description: "Quick path for simple changes that don't require architecture design"

  # Iterative rollback: design phase discovers need for more requirements
  - from: design
    to: analyze
    trigger: "#analyze"
    condition: "new_requirements_discovered"
    description: "Return to analysis when new requirements are found during design"

error_recovery:
  on_missing_prerequisite:
    action: "Suggest running prerequisite phase"
    auto_route: true

  on_phase_failure:
    action: "Pause and report error"
    options:
      - "Retry current phase"
      - "Rollback to previous phase"
      - "Skip and continue (if allowed)"

  on_invalid_state:
    action: "Re-initialize project state"
    suggestion: "Run #init --refresh to rebuild context, or manually check .ai-agents/workspace/session.yaml"
