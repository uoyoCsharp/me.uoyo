id: "project"
type: "project"
name: "Project Knowledge"
version: "1.0"
description: "Custom knowledge specific to this project"

token_estimate:
  total: variable
  estimated_range: "0-5000"
  note: "Add token estimates when adding project files"

loading_strategy:
  level_1_overview:
    description: "Read manifest only for summary"
    tokens: 100
    use_case: "Check available project knowledge"

  level_2_full:
    description: "Load complete knowledge files"
    tokens: variable
    use_case: "Complete project context"

loading:
  priority: 4
  auto_load: true

files: []

attributes:
  usage_guide: |
    Add project-specific knowledge files to this directory.
    Common files include:
    - glossary.md - Business domain terminology
    - architecture-decisions.md - Project ADRs
    - conventions.md - Project-specific conventions
    - integrations.md - External system integration notes

scenarios: []
