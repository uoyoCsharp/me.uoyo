# AI Agent Framework - User Configuration
# This file contains user-configurable settings only.
# Resources (agents, skills, patterns) are discovered dynamically from their directories.

name: "AI Agent Workflow Framework"
version: "1.5"

# ============================================================
# System Settings
# ============================================================
system:
  default_agent: conductor
  language: en-US
  interaction_mode: semi-auto
  confirm_before_generate: true
  confirm_before_save: true

# ============================================================
# Output Settings
# ============================================================
output:
  no_emojis: true
  flow_charts:
    use_mermaid: true
  data_format: yaml
  max_description: 500

# ============================================================
# Pattern Settings
# ============================================================
pattern:
  # Active architecture pattern
  # Use "#init" to auto-detect or "#config" to change
  active: ""

  selection:
    auto_detect: true
    confirm_with_user: true

# ============================================================
# Knowledge Settings
# ============================================================
knowledge:
  loading_order:
    - core/*
    - "patterns/{active}/*"
    - principle/*
    - project/*

  lazy_load:
    - "patterns/{inactive}/*"

# ============================================================
# Directory Structure (Advanced)
# ============================================================
# All directory paths below are repository-root relative.
directories:
  agents: .ai-agents/agents/
  skills: .ai-agents/skills/
  workflows: .ai-agents/workflows/
  knowledge: .ai-agents/knowledge/
  workspace: .ai-agents/workspace/
  workspace_session: .ai-agents/workspace/session.yaml
  workspace_context: .ai-agents/workspace/project-context.yaml
  workspace_history: .ai-agents/workspace/history/
  workspace_artifacts: .ai-agents/workspace/artifacts/
  workspace_requirements: .ai-agents/workspace/requirements/
